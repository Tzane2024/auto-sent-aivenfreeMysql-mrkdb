name: Database Keep-Alive-TG Ping and Log

on:
  schedule:
    - cron: '47 * * * *'
  workflow_dispatch:

jobs:
  ping-and-log:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install MySQL Client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      # 读取状态文件
      - name: Read Last Notified Status
        id: read_status
        run: |
          # 先拉取最新代码，确保读到最新的 status.txt
          git pull origin ${GITHUB_REF#refs/heads/} --rebase || true
          
          if [ -f status.txt ]; then
            LAST=$(cat status.txt | tr -d ' \n\r')
            echo "last_status=$LAST" >> $GITHUB_OUTPUT
            echo "上次通知状态: $LAST"
          else
            echo "last_status=unknown" >> $GITHUB_OUTPUT
            echo "首次运行，上次状态: unknown"
          fi

      # 数据库操作
      - name: Database Keep-Alive Operation
        id: database_operation
        continue-on-error: true
        env:
          DB_HOST: ${{ secrets.AVN_DB_HOST }}
          DB_PORT: ${{ secrets.AVN_DB_PORT }}
          DB_USER: ${{ secrets.AVN_DB_USER }}
          DB_PASS: ${{ secrets.AVN_DB_PASSWORD }}
          DB_NAME: ${{ secrets.AVN_DB_NAME }}
        run: |
          mysql --ssl-mode=REQUIRED -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" -p"$DB_PASS" -D "$DB_NAME" <<EOF
          CREATE TABLE IF NOT EXISTS bh (
            id INT AUTO_INCREMENT PRIMARY KEY,
            ping_time TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
            remark VARCHAR(255) DEFAULT 'GitHub Actions Keep-Alive'
          ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
          
          INSERT INTO bh (ping_time) VALUES (NOW());
          SELECT * FROM bh ORDER BY ping_time DESC LIMIT 3;
          EOF

      # 判断是否发送通知
      - name: Determine If Should Send Notification
        id: should_send
        run: |
          if [ "${{ steps.database_operation.outcome }}" = "success" ]; then
            CURRENT="success"
          else
            CURRENT="failure"
          fi
          
          LAST="${{ steps.read_status.outputs.last_status }}"
          
          echo "当前状态: $CURRENT"
          echo "上次通知状态: $LAST"
          
          if [ "$CURRENT" = "failure" ]; then
            echo "should_send=true" >> $GITHUB_OUTPUT
            echo "message_type=failure" >> $GITHUB_OUTPUT
          elif [ "$CURRENT" = "success" ] && [ "$LAST" != "success" ]; then
            echo "should_send=true" >> $GITHUB_OUTPUT
            echo "message_type=success" >> $GITHUB_OUTPUT
          else
            echo "should_send=false" >> $GITHUB_OUTPUT
          fi

      # 发送失败通知
      - name: Send Telegram Failure Notification
        if: steps.should_send.outputs.should_send == 'true' && steps.should_send.outputs.message_type == 'failure'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MESSAGE="⚠️ Database keep-alive FAILED at $(date) - Repository: ${{ github.repository }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MESSAGE}"

      # 发送成功通知
      - name: Send Telegram Success Notification
        if: steps.should_send.outputs.should_send == 'true' && steps.should_send.outputs.message_type == 'success'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MESSAGE="✅ Database keep-alive SUCCESS at $(date) - Repository: ${{ github.repository }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MESSAGE}"

      # 使用 GitHub API 直接更新状态文件（避免 Git 冲突）
      - name: Update Status File via API
        if: always() && steps.should_send.outputs.should_send == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # 获取当前状态
          if [ "${{ steps.database_operation.outcome }}" = "success" ]; then
            NEW_STATUS="success"
          else
            NEW_STATUS="failure"
          fi
          
          echo "更新状态文件为: $NEW_STATUS"
          
          # 获取当前 status.txt 文件的 SHA
          SHA=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/contents/status.txt" \
            | jq -r '.sha' 2>/dev/null || echo "")
          
          # 编码文件内容
          CONTENT=$(echo -n "$NEW_STATUS" | base64 -w 0)
          
          # 使用 API 更新或创建文件
          if [ -n "$SHA" ] && [ "$SHA" != "null" ]; then
            # 更新现有文件
            curl -s -X PUT \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO/contents/status.txt" \
              -d "{
                \"message\": \"Update keepalive status to $NEW_STATUS\",
                \"content\": \"$CONTENT\",
                \"sha\": \"$SHA\",
                \"branch\": \"${GITHUB_REF#refs/heads/}\"
              }" > /dev/null
          else
            # 创建新文件
            curl -s -X PUT \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO/contents/status.txt" \
              -d "{
                \"message\": \"Create keepalive status file\",
                \"content\": \"$CONTENT\",
                \"branch\": \"${GITHUB_REF#refs/heads/}\"
              }" > /dev/null
          fi
          
          echo "状态文件已通过 API 更新"
