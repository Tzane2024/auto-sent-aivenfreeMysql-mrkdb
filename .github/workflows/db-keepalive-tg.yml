name: Database Keep-Alive-TG Ping and Log

on:
  schedule:
    - cron: '47 * * * *'
  workflow_dispatch:

jobs:
  ping-and-log:
    runs-on: ubuntu-latest
    steps:
      - name: Install MySQL Client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Check and Create Required Tables
        env:
          DB_HOST: ${{ secrets.AVN_DB_HOST }}
          DB_PORT: ${{ secrets.AVN_DB_PORT }}
          DB_USER: ${{ secrets.AVN_DB_USER }}
          DB_PASS: ${{ secrets.AVN_DB_PASSWORD }}
          DB_NAME: ${{ secrets.AVN_DB_NAME }}
        run: |
          mysql --ssl-mode=REQUIRED -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" -p"$DB_PASS" -D "$DB_NAME" <<EOF
          -- 主表：记录每次 ping
          CREATE TABLE IF NOT EXISTS bh (
            id INT AUTO_INCREMENT PRIMARY KEY,
            ping_time TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
            remark VARCHAR(255) DEFAULT 'GitHub Actions Keep-Alive'
          ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
          
          -- 状态表：记录最后一次成功通知的状态（仅用于成功去重）
          CREATE TABLE IF NOT EXISTS keepalive_notify_status (
            id INT PRIMARY KEY DEFAULT 1,
            last_success_notified_at TIMESTAMP NULL,
            updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
          ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
          
          -- 初始化状态表（如果为空）
          INSERT IGNORE INTO keepalive_notify_status (id, last_success_notified_at)
          VALUES (1, NULL);
          EOF

      - name: Database Keep-Alive Operation
        id: database_operation
        env:
          DB_HOST: ${{ secrets.AVN_DB_HOST }}
          DB_PORT: ${{ secrets.AVN_DB_PORT }}
          DB_USER: ${{ secrets.AVN_DB_USER }}
          DB_PASS: ${{ secrets.AVN_DB_PASSWORD }}
          DB_NAME: ${{ secrets.AVN_DB_NAME }}
        run: |
          # 执行数据库插入和查询
          if mysql --ssl-mode=REQUIRED -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" -p"$DB_PASS" -D "$DB_NAME" <<EOF
          INSERT INTO bh (ping_time) VALUES (NOW());
          SELECT * FROM bh ORDER BY ping_time DESC LIMIT 3;
          EOF
          then
            echo "current_outcome=success" >> $GITHUB_OUTPUT
            echo "✅ Success: Database operation completed."
          else
            echo "current_outcome=failure" >> $GITHUB_OUTPUT
            echo "❌ Error: Database operation failed."
            exit 1
          fi

      - name: Check If Success Notification Should Be Sent
        id: check_success_notify
        if: success()
        env:
          DB_HOST: ${{ secrets.AVN_DB_HOST }}
          DB_PORT: ${{ secrets.AVN_DB_PORT }}
          DB_USER: ${{ secrets.AVN_DB_USER }}
          DB_PASS: ${{ secrets.AVN_DB_PASSWORD }}
          DB_NAME: ${{ secrets.AVN_DB_NAME }}
        run: |
          # 查询上次成功通知的时间
          LAST_NOTIFIED=$(mysql --ssl-mode=REQUIRED -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" -p"$DB_PASS" -D "$DB_NAME" -sN <<EOF
          SELECT last_success_notified_at FROM keepalive_notify_status WHERE id = 1;
          EOF
          )
          
          # 如果从未发送过成功通知，或者上次成功通知时间超过 23 小时（避免每天发多次）
          # 这里使用简单逻辑：如果 last_success_notified_at 为 NULL，则发送
          if [ -z "$LAST_NOTIFIED" ] || [ "$LAST_NOTIFIED" = "NULL" ]; then
            echo "should_notify=true" >> $GITHUB_OUTPUT
            echo "首次成功运行，将发送成功通知"
          else
            echo "should_notify=false" >> $GITHUB_OUTPUT
            echo "已经发送过成功通知，本次不再重复发送"
          fi

      - name: Send Telegram Failure Notification
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DB_HOST: ${{ secrets.AVN_DB_HOST }}
          DB_PORT: ${{ secrets.AVN_DB_PORT }}
          DB_USER: ${{ secrets.AVN_DB_USER }}
          DB_PASS: ${{ secrets.AVN_DB_PASSWORD }}
          DB_NAME: ${{ secrets.AVN_DB_NAME }}
        run: |
          MESSAGE="⚠️ Database keep-alive FAILED at $(date) - Repository: ${{ github.repository }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MESSAGE}"
          
          # 失败时，清除成功通知标记（这样恢复成功后可以再次发送成功通知）
          mysql --ssl-mode=REQUIRED -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" -p"$DB_PASS" -D "$DB_NAME" <<EOF
          UPDATE keepalive_notify_status 
          SET last_success_notified_at = NULL 
          WHERE id = 1;
          EOF
          echo "失败通知已发送，已清除成功通知标记"

      - name: Send Telegram Success Notification
        if: success() && steps.check_success_notify.outputs.should_notify == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DB_HOST: ${{ secrets.AVN_DB_HOST }}
          DB_PORT: ${{ secrets.AVN_DB_PORT }}
          DB_USER: ${{ secrets.AVN_DB_USER }}
          DB_PASS: ${{ secrets.AVN_DB_PASSWORD }}
          DB_NAME: ${{ secrets.AVN_DB_NAME }}
        run: |
          MESSAGE="✅ Database keep-alive SUCCESS at $(date) - Repository: ${{ github.repository }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MESSAGE}"
          
          # 更新成功通知时间
          mysql --ssl-mode=REQUIRED -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" -p"$DB_PASS" -D "$DB_NAME" <<EOF
          UPDATE keepalive_notify_status 
          SET last_success_notified_at = NOW() 
          WHERE id = 1;
          EOF
          echo "成功通知已发送"

      - name: Success Without Notification
        if: success() && steps.check_success_notify.outputs.should_notify == 'false'
        run: |
          echo "✅ Database operation succeeded, but success notification already sent before (only first success after failure triggers notification)"
