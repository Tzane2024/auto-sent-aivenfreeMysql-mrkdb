name: Database Keep-Alive-TG Ping and Log

on:
  schedule:
    - cron: '47 * * * *'
  workflow_dispatch:

jobs:
  ping-and-log:
    runs-on: ubuntu-latest
    steps:
      - name: Install MySQL Client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Check and Create Tables
        env:
          DB_HOST: ${{ secrets.AVN_DB_HOST }}
          DB_PORT: ${{ secrets.AVN_DB_PORT }}
          DB_USER: ${{ secrets.AVN_DB_USER }}
          DB_PASS: ${{ secrets.AVN_DB_PASSWORD }}
          DB_NAME: ${{ secrets.AVN_DB_NAME }}
        run: |
          mysql --ssl-mode=REQUIRED -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" -p"$DB_PASS" -D "$DB_NAME" <<EOF
          -- 日志表：记录每次 ping
          CREATE TABLE IF NOT EXISTS bh (
            id INT AUTO_INCREMENT PRIMARY KEY,
            ping_time TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
            remark VARCHAR(255) DEFAULT 'GitHub Actions Keep-Alive'
          ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
          
          -- 状态表：记录最后一次运行状态
          CREATE TABLE IF NOT EXISTS keepalive_state (
            id INT PRIMARY KEY DEFAULT 1,
            last_status VARCHAR(10) DEFAULT 'unknown',
            last_notified_status VARCHAR(10) DEFAULT 'unknown',
            updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
          ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
          
          -- 初始化状态表（如果为空）
          INSERT IGNORE INTO keepalive_state (id, last_status, last_notified_status) 
          VALUES (1, 'unknown', 'unknown');
          EOF

      - name: Get Last Notified Status
        id: get_status
        env:
          DB_HOST: ${{ secrets.AVN_DB_HOST }}
          DB_PORT: ${{ secrets.AVN_DB_PORT }}
          DB_USER: ${{ secrets.AVN_DB_USER }}
          DB_PASS: ${{ secrets.AVN_DB_PASSWORD }}
          DB_NAME: ${{ secrets.AVN_DB_NAME }}
        run: |
          # 查询上次已通知的状态
          LAST_NOTIFIED=$(mysql --ssl-mode=REQUIRED -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" -p"$DB_PASS" -D "$DB_NAME" -sN <<EOF
          SELECT last_notified_status FROM keepalive_state WHERE id = 1;
          EOF
          )
          
          echo "last_notified_status=$LAST_NOTIFIED" >> $GITHUB_OUTPUT
          echo "上次已通知的状态: $LAST_NOTIFIED"

      - name: Database Keep-Alive Operation
        id: database_operation
        env:
          DB_HOST: ${{ secrets.AVN_DB_HOST }}
          DB_PORT: ${{ secrets.AVN_DB_PORT }}
          DB_USER: ${{ secrets.AVN_DB_USER }}
          DB_PASS: ${{ secrets.AVN_DB_PASSWORD }}
          DB_NAME: ${{ secrets.AVN_DB_NAME }}
        run: |
          # 执行数据库插入
          if mysql --ssl-mode=REQUIRED -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" -p"$DB_PASS" -D "$DB_NAME" <<EOF
          INSERT INTO bh (ping_time) VALUES (NOW());
          SELECT * FROM bh ORDER BY ping_time DESC LIMIT 3;
          EOF
          then
            echo "current_outcome=success" >> $GITHUB_OUTPUT
            echo "CURRENT_OUTCOME=success" >> $GITHUB_ENV
            echo "✅ Success: Database operation completed."
          else
            echo "current_outcome=failure" >> $GITHUB_OUTPUT
            echo "CURRENT_OUTCOME=failure" >> $GITHUB_ENV
            echo "❌ Error: Database operation failed."
          fi

      - name: Determine If Should Send Notification
        id: should_send
        env:
          CURRENT_OUTCOME: ${{ steps.database_operation.outputs.current_outcome }}
        run: |
          CURRENT="$CURRENT_OUTCOME"
          LAST_NOTIFIED="${{ steps.get_status.outputs.last_notified_status }}"
          
          echo "当前状态: $CURRENT"
          echo "上次通知状态: $LAST_NOTIFIED"
          
          # 发送通知的条件：
          # 1. 失败：每次都发送
          # 2. 成功：只在状态变化时发送（unknown->success 或 failure->success）
          if [ "$CURRENT" = "failure" ]; then
            echo "should_send=true" >> $GITHUB_OUTPUT
            echo "send_reason=failure" >> $GITHUB_OUTPUT
            echo "失败，需要发送通知"
          elif [ "$CURRENT" = "success" ] && [ "$LAST_NOTIFIED" != "success" ]; then
            echo "should_send=true" >> $GITHUB_OUTPUT
            echo "send_reason=success_status_change" >> $GITHUB_OUTPUT
            echo "成功且状态变化（$LAST_NOTIFIED -> success），需要发送通知"
          else
            echo "should_send=false" >> $GITHUB_OUTPUT
            echo "成功但状态未变化（已通知过成功），不发送通知"
          fi

      - name: Send Telegram Notification on Failure
        if: always() && steps.should_send.outputs.should_send == 'true' && env.CURRENT_OUTCOME == 'failure'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DB_HOST: ${{ secrets.AVN_DB_HOST }}
          DB_PORT: ${{ secrets.AVN_DB_PORT }}
          DB_USER: ${{ secrets.AVN_DB_USER }}
          DB_PASS: ${{ secrets.AVN_DB_PASSWORD }}
          DB_NAME: ${{ secrets.AVN_DB_NAME }}
          CURRENT_OUTCOME: ${{ steps.database_operation.outputs.current_outcome }}
        run: |
          MESSAGE="⚠️ Database keep-alive FAILED at $(date) - Repository: ${{ github.repository }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MESSAGE}"
          echo "失败通知已发送"
          
          # 更新已通知状态为 failure
          mysql --ssl-mode=REQUIRED -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" -p"$DB_PASS" -D "$DB_NAME" <<EOF
          UPDATE keepalive_state 
          SET last_status = 'failure', last_notified_status = 'failure', updated_at = NOW()
          WHERE id = 1;
          EOF

      - name: Send Telegram Success Notification
        if: always() && steps.should_send.outputs.should_send == 'true' && env.CURRENT_OUTCOME == 'success'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DB_HOST: ${{ secrets.AVN_DB_HOST }}
          DB_PORT: ${{ secrets.AVN_DB_PORT }}
          DB_USER: ${{ secrets.AVN_DB_USER }}
          DB_PASS: ${{ secrets.AVN_DB_PASSWORD }}
          DB_NAME: ${{ secrets.AVN_DB_NAME }}
          CURRENT_OUTCOME: ${{ steps.database_operation.outputs.current_outcome }}
        run: |
          MESSAGE="✅ Database keep-alive SUCCESS at $(date) - Repository: ${{ github.repository }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MESSAGE}"
          echo "成功通知已发送"
          
          # 更新已通知状态为 success
          mysql --ssl-mode=REQUIRED -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" -p"$DB_PASS" -D "$DB_NAME" <<EOF
          UPDATE keepalive_state 
          SET last_status = 'success', last_notified_status = 'success', updated_at = NOW()
          WHERE id = 1;
          EOF

      - name: Update State Without Notification
        if: always() && steps.should_send.outputs.should_send == 'false'
        env:
          DB_HOST: ${{ secrets.AVN_DB_HOST }}
          DB_PORT: ${{ secrets.AVN_DB_PORT }}
          DB_USER: ${{ secrets.AVN_DB_USER }}
          DB_PASS: ${{ secrets.AVN_DB_PASSWORD }}
          DB_NAME: ${{ secrets.AVN_DB_NAME }}
          CURRENT_OUTCOME: ${{ steps.database_operation.outputs.current_outcome }}
        run: |
          CURRENT="$CURRENT_OUTCOME"
          
          # 只更新 last_status，不更新 last_notified_status
          mysql --ssl-mode=REQUIRED -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" -p"$DB_PASS" -D "$DB_NAME" <<EOF
          UPDATE keepalive_state 
          SET last_status = '$CURRENT', updated_at = NOW()
          WHERE id = 1;
          EOF
          
          echo "状态已更新为 $CURRENT，但未发送通知（上次通知状态保持不变）"

      - name: Fail workflow if database operation failed
        if: env.CURRENT_OUTCOME == 'failure'
        run: |
          echo "数据库操作失败，workflow 将以失败状态结束"
          exit 1
